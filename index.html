<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modiq</title>
    <!-- 폰트 CSS는 비차단 로드(media=print→onload all): 렌더를 막지 않아 메트릭 정합 폴백이 즉시 그려짐 → 첫 페인트 깜빡임 없음 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link id="pretendard-font" rel="stylesheet" href="/fonts/pretendard-subset.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="/fonts/pretendard-subset.css" /></noscript>
    <!-- 저장된 테마를 JS 번들 로드 전에 적용 → 다크/라이트 깜빡임 방지 -->
    <script>
      try { if (localStorage.getItem('modiq_theme') === 'light') document.documentElement.classList.add('light'); } catch (e) {}
    </script>
    <!-- 🔒 보호 영역(CLAUDE.md "대시보드 로딩/첫 화면" 참조) — 아래 인라인 배경/테마 스크립트·부팅 스플래시 제거·수정 금지. -->
    <!-- 첫 페인트부터 정확한 배경색 + 부팅 스플래시: JS 번들이 도착하기 전 흰 화면 깜빡임 제거 -->
    <style>
      html { background:#0f1117; }
      html.light { background:#f7f8fa; }
      body { margin:0; }
      #root { min-height:100vh; }
      /* 부팅 스플래시: 0.45s 지연 후에만 나타남 → 빠른(캐시) 로딩/새로고침에선 보이지 않고,
         그 사이엔 배경색만 보여 흰 화면 깜빡임은 그대로 방지(콜드스타트 보호 유지). 느린 로딩에서만 페이드인. */
      .modiq-boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; background:#0f1117; font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; opacity:0; animation:modiqBootReveal 0.18s ease-out 0.45s forwards; }
      @keyframes modiqBootReveal { to { opacity:1; } }
      html.light .modiq-boot { background:#f7f8fa; }
      .modiq-boot .wm { font-size:34px; font-weight:800; letter-spacing:-1px; color:#f0f2f5; line-height:1; }
      html.light .modiq-boot .wm { color:#111827; }
      .modiq-boot .wm b { color:#A8FF00; font-weight:800; }
      .modiq-boot .sub { font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#A8FF00; }
      .modiq-boot .bar { width:118px; height:3px; border-radius:3px; background:#2a2d3e; overflow:hidden; margin-top:4px; }
      html.light .modiq-boot .bar { background:#e2e5ea; }
      .modiq-boot .bar i { display:block; width:38%; height:100%; border-radius:3px; background:#A8FF00; animation:modiqBoot 1.05s ease-in-out infinite; }
      @keyframes modiqBoot { 0% { transform:translateX(-110%); } 100% { transform:translateX(330%); } }
      @media (prefers-reduced-motion: reduce) { .modiq-boot { animation:none; opacity:1; } .modiq-boot .bar i { animation:none; width:100%; opacity:.6; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="modiq-boot" aria-label="로딩 중">
        <div class="wm"><b>m</b>odiq</div>
        <div class="sub">talent agency OS</div>
        <div class="bar"><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- 🔒 보호 영역 보강 — 로드 실패 안전장치(수동): 15초 후에도 부팅 스플래시가 남아있으면
         (메인 번들 로드/실행 실패) '탭하여 새로고침' 안내만 표시. 자동 새로고침은 하지 않음
         (느린 로딩 중 불필요한 reload로 스플래시가 다시 뜨는 것을 방지). 기존 스플래시/스크립트는 변경 없이 추가만. -->
    <script>
      (function () {
        setTimeout(function () {
          var r = document.getElementById('root'); if (!r) return;
          var boot = r.querySelector('.modiq-boot'); if (!boot) return; // 정상 마운트되면 스플래시가 사라짐 → 종료
          var s = boot.querySelector('.sub'); if (s) s.textContent = '불러오지 못했어요 · 탭하여 새로고침';
          boot.style.cursor = 'pointer';
          boot.addEventListener('click', function () { location.reload(); });
        }, 15000);
      })();
    </script>
  </body>
</html>
